<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Concepts — David Slays Goliath</title>
<style>
  body { background: #D9C9A3; font-family: -apple-system, Segoe UI, Roboto, sans-serif; padding: 40px; margin: 0; }
  h1 { color: #1F3A52; font-family: Georgia, serif; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
  .card { background: #E8DCC0; border-radius: 14px; padding: 20px; box-shadow: 0 6px 16px rgba(31,22,8,0.18); text-align: center; }
  .card h2 { font-size: 14px; color: #3B2F1E; margin: 0 0 14px; }
  .big { width: 160px; height: 160px; }
  .wide { width: 240px; height: auto; }
  .row { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 14px; }
  .small { width: 32px; height: 32px; border: 1px solid #8C6A3F; border-radius: 4px; background: #fff; }
  .row span { font-size: 10px; color: #8C6A3F; display: block; margin-top: 4px; }
  .dark { background: #1F3A52; padding: 14px; border-radius: 10px; width: 60px; height: 60px; box-sizing: border-box; }
</style>
</head>
<body>
<h1>David Slays Goliath — Logo Concepts</h1>
<div class="grid">

  <div class="card">
    <h2>1. Shield + Sling</h2>
    <svg class="big" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2C4F6E"/><stop offset="100%" stop-color="#1F3A52"/></linearGradient>
        <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8C887"/><stop offset="100%" stop-color="#8C6A3F"/></linearGradient>
      </defs>
      <path d="M100,12 L176,38 V102 C176,148 142,178 100,192 C58,178 24,148 24,102 V38 Z" fill="url(#shieldFill)" stroke="url(#goldStroke)" stroke-width="5"/>
      <path d="M100,22 L166,45 V102 C166,142 136,168 100,181 C64,168 34,142 34,102 V45 Z" fill="none" stroke="#B8924D" stroke-width="1.2" opacity="0.5"/>
      <path d="M72,100 C76,82 90,76 100,90" fill="none" stroke="#E8DCC0" stroke-width="4" stroke-linecap="round"/>
      <path d="M100,90 C110,76 124,82 126,100 C127,108 116,114 100,116" fill="none" stroke="#E8DCC0" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="100" cy="116" rx="11" ry="8" fill="#B8924D" stroke="#E8DCC0" stroke-width="1.5"/>
      <circle cx="138" cy="76" r="9" fill="#E8DCC0" stroke="#B8924D" stroke-width="1.5"/>
      <path d="M104,108 Q120,92 132,82" fill="none" stroke="#E8DCC0" stroke-width="2" stroke-dasharray="3,5" opacity="0.7"/>
    </svg>
    <div class="row">
      <div>
        <svg class="small" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path d="M100,12 L176,38 V102 C176,148 142,178 100,192 C58,178 24,148 24,102 V38 Z" fill="#1F3A52" stroke="#8C6A3F" stroke-width="5"/>
          <path d="M72,100 C76,82 90,76 100,90" fill="none" stroke="#E8DCC0" stroke-width="6" stroke-linecap="round"/>
          <path d="M100,90 C110,76 124,82 126,100 C127,108 116,114 100,116" fill="none" stroke="#E8DCC0" stroke-width="6" stroke-linecap="round"/>
          <ellipse cx="100" cy="116" rx="13" ry="10" fill="#B8924D"/>
          <circle cx="138" cy="76" r="11" fill="#E8DCC0"/>
        </svg>
        <span>32px</span>
      </div>
      <svg class="dark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M100,12 L176,38 V102 C176,148 142,178 100,192 C58,178 24,148 24,102 V38 Z" fill="#2C4F6E" stroke="#B8924D" stroke-width="5"/>
        <path d="M72,100 C76,82 90,76 100,90" fill="none" stroke="#E8DCC0" stroke-width="4" stroke-linecap="round"/>
        <path d="M100,90 C110,76 124,82 126,100 C127,108 116,114 100,116" fill="none" stroke="#E8DCC0" stroke-width="4" stroke-linecap="round"/>
        <ellipse cx="100" cy="116" rx="11" ry="8" fill="#B8924D"/>
        <circle cx="138" cy="76" r="9" fill="#E8DCC0"/>
      </svg>
    </div>
  </div>

  <div class="card">
    <h2>2. Shield + Five Stones</h2>
    <svg class="big" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="shieldFill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2C4F6E"/><stop offset="100%" stop-color="#1F3A52"/></linearGradient>
        <radialGradient id="stoneFill" cx="35%" cy="30%" r="75%"><stop offset="0%" stop-color="#F2E3BF"/><stop offset="100%" stop-color="#B8924D"/></radialGradient>
      </defs>
      <path d="M100,12 L176,38 V102 C176,148 142,178 100,192 C58,178 24,148 24,102 V38 Z" fill="url(#shieldFill2)" stroke="#8C6A3F" stroke-width="5"/>
      <path d="M100,22 L166,45 V102 C166,142 136,168 100,181 C64,168 34,142 34,102 V45 Z" fill="none" stroke="#B8924D" stroke-width="1.2" opacity="0.5"/>
      <path d="M68,86 C72,62 90,52 100,66 C110,52 128,62 132,86" fill="none" stroke="#E8DCC0" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
      <circle cx="100" cy="150" r="13" fill="url(#stoneFill)"/>
      <circle cx="76" cy="158" r="11" fill="url(#stoneFill)"/>
      <circle cx="124" cy="158" r="11" fill="url(#stoneFill)"/>
      <circle cx="88" cy="128" r="10" fill="url(#stoneFill)"/>
      <circle cx="112" cy="128" r="10" fill="url(#stoneFill)"/>
    </svg>
    <div class="row">
      <div>
        <svg class="small" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path d="M100,12 L176,38 V102 C176,148 142,178 100,192 C58,178 24,148 24,102 V38 Z" fill="#1F3A52" stroke="#8C6A3F" stroke-width="5"/>
          <circle cx="100" cy="150" r="16" fill="#B8924D"/>
          <circle cx="74" cy="160" r="14" fill="#B8924D"/>
          <circle cx="126" cy="160" r="14" fill="#B8924D"/>
        </svg>
        <span>32px</span>
      </div>
      <svg class="dark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M100,12 L176,38 V102 C176,148 142,178 100,192 C58,178 24,148 24,102 V38 Z" fill="#2C4F6E" stroke="#B8924D" stroke-width="5"/>
        <path d="M68,86 C72,62 90,52 100,66 C110,52 128,62 132,86" fill="none" stroke="#E8DCC0" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="100" cy="150" r="13" fill="#B8924D"/>
        <circle cx="76" cy="158" r="11" fill="#B8924D"/>
        <circle cx="124" cy="158" r="11" fill="#B8924D"/>
        <circle cx="88" cy="128" r="10" fill="#B8924D"/>
        <circle cx="112" cy="128" r="10" fill="#B8924D"/>
      </svg>
    </div>
  </div>

  <div class="card">
    <h2>3. Monogram D+G</h2>
    <svg class="big" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringFill" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8C887"/><stop offset="100%" stop-color="#8C6A3F"/></linearGradient>
        <linearGradient id="letterFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F2E3BF"/><stop offset="100%" stop-color="#B8924D"/></linearGradient>
      </defs>
      <circle cx="100" cy="100" r="88" fill="#1F3A52" stroke="url(#ringFill)" stroke-width="5"/>
      <circle cx="100" cy="100" r="78" fill="none" stroke="#B8924D" stroke-width="1" opacity="0.4"/>
      <text x="78" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="98" font-weight="700" fill="url(#letterFill)">D</text>
      <text x="128" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="98" font-weight="700" fill="url(#letterFill)" opacity="0.92">G</text>
      <circle cx="103" cy="118" r="6" fill="#1F3A52" stroke="#E8DCC0" stroke-width="1.3"/>
    </svg>
    <div class="row">
      <div>
        <svg class="small" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="92" fill="#1F3A52"/>
          <text x="78" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="98" font-weight="700" fill="#E8C887">D</text>
          <text x="128" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="98" font-weight="700" fill="#E8C887" opacity="0.9">G</text>
        </svg>
        <span>32px</span>
      </div>
      <svg class="dark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="88" fill="#2C4F6E" stroke="#8C6A3F" stroke-width="5"/>
        <text x="78" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="98" font-weight="700" fill="#E8C887">D</text>
        <text x="128" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="98" font-weight="700" fill="#E8C887" opacity="0.92">G</text>
      </svg>
    </div>
  </div>

  <div class="card">
    <h2>4. Monogram D + Stone</h2>
    <svg class="big" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="letterFillD" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2C4F6E"/><stop offset="100%" stop-color="#1F3A52"/></linearGradient></defs>
      <rect x="10" y="10" width="180" height="180" rx="22" fill="#E8DCC0"/>
      <text x="100" y="152" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="700" fill="url(#letterFillD)">D</text>
      <circle cx="118" cy="108" r="14" fill="#B8924D" stroke="#8C6A3F" stroke-width="2"/>
    </svg>
    <div class="row">
      <div>
        <svg class="small" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="200" height="200" rx="26" fill="#E8DCC0"/>
          <text x="100" y="152" text-anchor="middle" font-family="Georgia, serif" font-size="150" font-weight="700" fill="#1F3A52">D</text>
          <circle cx="118" cy="108" r="16" fill="#B8924D"/>
        </svg>
        <span>32px</span>
      </div>
      <svg class="dark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="180" height="180" rx="22" fill="#E8DCC0"/>
        <text x="100" y="152" text-anchor="middle" font-family="Georgia, serif" font-size="150" font-weight="700" fill="#1F3A52">D</text>
        <circle cx="118" cy="108" r="14" fill="#B8924D"/>
      </svg>
    </div>
  </div>

  <div class="card">
    <h2>5. Crest + Full Name (arched)</h2>
    <svg class="wide" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="shieldFill5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2C4F6E"/><stop offset="100%" stop-color="#1F3A52"/></linearGradient>
        <path id="arcPath" d="M55,72 A95,95 0 0 1 245,72" fill="none"/>
      </defs>
      <text font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#1F3A52" letter-spacing="2">
        <textPath href="#arcPath" startOffset="50%" text-anchor="middle">DAVID SLAYS GOLIATH</textPath>
      </text>
      <g transform="translate(75,80)">
        <path d="M75,4 L141,26 V76 C141,114 113,138 75,150 C37,138 9,114 9,76 V26 Z" fill="url(#shieldFill5)" stroke="#8C6A3F" stroke-width="4"/>
        <path d="M75,13 L132,30 V76 C132,108 109,128 75,138 C41,128 18,108 18,76 V30 Z" fill="none" stroke="#B8924D" stroke-width="1" opacity="0.5"/>
        <path d="M52,82 C56,62 68,55 75,67" fill="none" stroke="#E8DCC0" stroke-width="3" stroke-linecap="round"/>
        <path d="M75,67 C82,55 96,62 98,82 C99,90 88,96 75,98" fill="none" stroke="#E8DCC0" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="75" cy="98" rx="8" ry="6" fill="#B8924D" stroke="#E8DCC0" stroke-width="1.2"/>
        <circle cx="104" cy="58" r="7" fill="#E8DCC0" stroke="#B8924D" stroke-width="1.2"/>
      </g>
    </svg>
    <div class="row">
      <div>
        <svg class="small" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(75,30)">
            <path d="M75,4 L141,26 V76 C141,114 113,138 75,150 C37,138 9,114 9,76 V26 Z" fill="#1F3A52" stroke="#8C6A3F" stroke-width="8"/>
            <ellipse cx="75" cy="98" rx="13" ry="10" fill="#B8924D"/>
          </g>
        </svg>
        <span>32px (shield only)</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>6. Seal + Full Name (circular)</h2>
    <svg class="big" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringFill6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8C887"/><stop offset="100%" stop-color="#8C6A3F"/></linearGradient>
        <linearGradient id="shieldFill6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2C4F6E"/><stop offset="100%" stop-color="#1F3A52"/></linearGradient>
        <path id="topArc" d="M30,110 A80,80 0 0 1 190,110" fill="none"/>
        <path id="bottomArc" d="M46,150 A65,65 0 0 0 174,150" fill="none"/>
      </defs>
      <circle cx="110" cy="110" r="100" fill="#E8DCC0" stroke="url(#ringFill6)" stroke-width="5"/>
      <circle cx="110" cy="110" r="88" fill="none" stroke="#8C6A3F" stroke-width="1" opacity="0.5"/>
      <text font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#1F3A52" letter-spacing="1.5">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">DAVID SLAYS GOLIATH</textPath>
      </text>
      <text font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#8C6A3F" letter-spacing="2">
        <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">UNWAVERING FAITH</textPath>
      </text>
      <g transform="translate(70,68)">
        <path d="M40,2 L75,16 V46 C75,68 60,82 40,90 C20,82 5,68 5,46 V16 Z" fill="url(#shieldFill6)" stroke="#8C6A3F" stroke-width="3"/>
        <path d="M24,54 C26,42 33,38 40,46" fill="none" stroke="#E8DCC0" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M40,46 C47,38 54,42 56,54 C57,59 50,63 40,64" fill="none" stroke="#E8DCC0" stroke-width="2.2" stroke-linecap="round"/>
        <ellipse cx="40" cy="64" rx="5" ry="4" fill="#B8924D" stroke="#E8DCC0" stroke-width="0.8"/>
        <circle cx="60" cy="32" r="4.5" fill="#E8DCC0" stroke="#B8924D" stroke-width="0.8"/>
      </g>
    </svg>
    <div class="row">
      <div>
        <svg class="small" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <circle cx="110" cy="110" r="105" fill="#E8DCC0" stroke="#8C6A3F" stroke-width="6"/>
          <g transform="translate(70,68)">
            <path d="M40,2 L75,16 V46 C75,68 60,82 40,90 C20,82 5,68 5,46 V16 Z" fill="#1F3A52"/>
            <ellipse cx="40" cy="64" rx="7" ry="6" fill="#B8924D"/>
          </g>
        </svg>
        <span>32px</span>
      </div>
      <svg class="dark" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <circle cx="110" cy="110" r="100" fill="#E8DCC0" stroke="#8C6A3F" stroke-width="5"/>
        <g transform="translate(70,68)">
          <path d="M40,2 L75,16 V46 C75,68 60,82 40,90 C20,82 5,68 5,46 V16 Z" fill="#1F3A52"/>
          <ellipse cx="40" cy="64" rx="5" ry="4" fill="#B8924D"/>
        </g>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
