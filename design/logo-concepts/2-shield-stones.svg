<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="shieldFill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C4F6E"/>
      <stop offset="100%" stop-color="#1F3A52"/>
    </linearGradient>
    <radialGradient id="stoneFill" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#F2E3BF"/>
      <stop offset="100%" stop-color="#B8924D"/>
    </radialGradient>
  </defs>

  <path d="M100,12 L176,38 V102 C176,148 142,178 100,192 C58,178 24,148 24,102 V38 Z"
        fill="url(#shieldFill2)" stroke="#8C6A3F" stroke-width="5"/>
  <path d="M100,22 L166,45 V102 C166,142 136,168 100,181 C64,168 34,142 34,102 V45 Z"
        fill="none" stroke="#B8924D" stroke-width="1.2" opacity="0.5"/>

  <!-- sling strap loop above the stones -->
  <path d="M68,86 C72,62 90,52 100,66 C110,52 128,62 132,86"
        fill="none" stroke="#E8DCC0" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

  <!-- five stones, pyramid -->
  <circle cx="100" cy="150" r="13" fill="url(#stoneFill)"/>
  <circle cx="76" cy="158" r="11" fill="url(#stoneFill)"/>
  <circle cx="124" cy="158" r="11" fill="url(#stoneFill)"/>
  <circle cx="88" cy="128" r="10" fill="url(#stoneFill)"/>
  <circle cx="112" cy="128" r="10" fill="url(#stoneFill)"/>
</svg>
