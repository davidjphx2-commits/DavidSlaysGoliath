<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ringFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C887"/>
      <stop offset="100%" stop-color="#8C6A3F"/>
    </linearGradient>
    <linearGradient id="letterFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2E3BF"/>
      <stop offset="100%" stop-color="#B8924D"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="88" fill="#1F3A52" stroke="url(#ringFill)" stroke-width="5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#B8924D" stroke-width="1" opacity="0.4"/>

  <text x="78" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="98" font-weight="700" fill="url(#letterFill)">D</text>
  <text x="128" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="98" font-weight="700" fill="url(#letterFill)" opacity="0.92">G</text>

  <!-- single stone accent where the letters meet -->
  <circle cx="103" cy="118" r="6" fill="#1F3A52" stroke="#E8DCC0" stroke-width="1.3"/>
</svg>
